<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Bakery | Birgunj</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#FFF8F1;
}

.glass{
background:rgba(255,255,255,.55);
backdrop-filter:blur(18px);
}

.hero{
background:url('https://images.unsplash.com/photo-1519864600265-abb23847ef2c?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
}

</style>

</head>

<body>

<nav class="glass fixed top-0 left-0 w-full z-50 shadow-xl">

<div class="max-w-7xl mx-auto flex justify-between items-center p-5">

<h1 class="text-2xl font-bold">
🍰 Bakery Website
</h1>

<div class="space-x-5 hidden md:flex">

<button>Home</button>

<button>Menu</button>

<button>Custom Orders</button>

<button>About</button>

<button>Contact</button>

</div>

</div>

</nav>

<section class="hero h-screen flex items-center justify-center text-center">

<div class="bg-white/60 backdrop-blur-lg p-10 rounded-3xl">

<h1 class="text-5xl font-extrabold">

Crafting Sweet Memories Near Ghanta Ghar, Birgunj.

</h1>

<p class="mt-5 text-lg">

Luxury Premium Cakes For Every Celebration

</p>

<div class="mt-8">

<a href="https://wa.me/9779807242440" class="bg-pink-600 text-white px-8 py-4 rounded-xl">

Order Now

</a>

<a href="#" class="bg-amber-500 text-white px-8 py-4 rounded-xl ml-4">

Customize Cake

</a>

</div>

</div>

</section>
<!-- MENU SECTION -->

<section id="menu" class="py-20 bg-white">

<div class="max-w-7xl mx-auto px-6">

<h2 class="text-4xl font-bold text-center mb-10">
Premium Cake Collection
</h2>

<div class="flex justify-center mb-8">

<input
id="search"
type="text"
placeholder="Search Cakes..."
class="w-full max-w-xl p-4 border rounded-xl shadow"/>

</div>

<div id="cakeGrid"
class="grid md:grid-cols-2 lg:grid-cols-4 gap-8">

<div class="card p-5">

<img
src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=800&q=80"
class="rounded-xl mb-4">

<h3 class="text-xl font-bold">
Royal Chocolate Truffle
</h3>

<p class="text-gray-600 mt-2">
Rich Belgian Chocolate Cake
</p>

<p class="text-pink-600 font-bold text-xl mt-3">
NRs 2500
</p>

<button
onclick="orderNow('Royal Chocolate Truffle',2500)"
class="mt-4 bg-green-600 text-white px-5 py-3 rounded-xl w-full">

Quick Order via WhatsApp

</button>

</div>

</div>

</div>

</section>
<script src="script.js"><!-- CUSTOM ORDER SECTION -->

<section id="custom-order" class="py-20 bg-orange-50">

<div class="max-w-4xl mx-auto px-6">

<h2 class="text-4xl font-bold text-center mb-10">
Customize Your Cake
</h2>

<form id="orderForm" class="space-y-6">

<input
type="text"
id="name"
placeholder="Full Name"
class="w-full p-4 border rounded-xl"
required>

<input
type="tel"
id="phone"
placeholder="Phone Number"
class="w-full p-4 border rounded-xl"
required>

<select
id="cake"
class="w-full p-4 border rounded-xl">

<option>Royal Chocolate Truffle</option>

<option>Classic Red Velvet</option>

<option>Blueberry Glaze Cheesecake</option>

<option>Lotus Biscoff Dream</option>

<option>Hazelnut Praline</option>

<option>Custom Cake</option>

</select>

<input
type="datetime-local"
id="date"
class="w-full p-4 border rounded-xl">

<textarea
id="message"
placeholder="Special Message on Cake"
class="w-full p-4 border rounded-xl"></textarea>

<textarea
id="address"
placeholder="Delivery Address (Near Ghanta Ghar & Birgunj Area)"
class="w-full p-4 border rounded-xl"></textarea>

<button
type="submit"
class="w-full bg-green-600 text-white py-4 rounded-xl text-lg font-bold">

Submit Order via WhatsApp

</button>

</form>

</div>

</section></script>

</body>

  </html>
